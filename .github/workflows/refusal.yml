name: environment

on:
  push:

jobs:
  aspect:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        one: ["gravity", "battery", "former", "gentle", "reproduce"]
        cassette: ["toothache", "nationality", "express", "survival"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar cr.jar
